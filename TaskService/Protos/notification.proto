syntax = "proto3";

option csharp_namespace = "NotificationService.Protos";

package notification;

service NotificationGrpc {
  rpc SendTaskNotification (NotificationTaskRequest) returns (NotificationTaskResponse);
}

message NotificationTaskRequest {
  int32 userId = 1;
  string message = 2;
  int32 taskId = 3;
}

message NotificationTaskResponse {
  bool success = 1;
}
