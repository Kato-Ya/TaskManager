syntax = "proto3";

option csharp_namespace = "UserService.Protos";

package user;

service UserGrpc {
  rpc GetUserById (UserIdRequest) returns (UserResponse);
  rpc GetUserByName (UserNameRequest) returns (UserResponse);
}

message UserIdRequest {
  int32 id = 1;
}

message UserNameRequest {
  string username = 1;
}

message UserResponse {
  int32 id = 1;
  string username = 2;
  string email = 3;
  string createdAt = 4;
  string passwordHash = 5;
  repeated string roles = 6;
}