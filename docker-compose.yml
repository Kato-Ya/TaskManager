version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres2
    restart: always
    environment:
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    networks:
      - app-network
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
     - app-network

  userservice:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    ports:
      - "5000:8080" # out -> in - gRPC
      - "5001:8081" # out -> in - swagger
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - app-network

  taskservice:
    build:
      context: .
      dockerfile: TaskService/Dockerfile
    ports:
      - "5002:8080"
      - "5007:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - userservice
    networks:
      - app-network
   
  notificationservice:
     build:
       context: .
       dockerfile: NotificationService/Dockerfile
     ports:
       - "5003:8080"
       - "5005:8081"
     environment:
       - ASPNETCORE_ENVIRONMENT=Development
     depends_on:
       - redis
     networks:
       - app-network

  chatservice:
     build:
       context: .
       dockerfile: ChatService/Dockerfile
     ports:
       - "5004:8080"
       - "5010:8081"
     environment:
       - ASPNETCORE_ENVIRONMENT=Development
     depends_on:
       - redis
       - postgres
     networks:
       - app-network

  authservice:
     build:
       context: .
       dockerfile: AuthenticationService/Dockerfile
     ports:
       - "5008:8080" 
       - "5009:8081"
     environment:
       - ASPNETCORE_ENVIRONMENT=Development
     depends_on:
       - userservice
     networks:
       - app-network
  mailhog:
     image: mailhog/mailhog
     container_name: mailhog
     ports:
        - "8025:8025"   # web-app
        - "1025:1025"   # smtp-port
  # frontend:
  #     build:
  #       context: ./TMApp
  #       dockerfile: Dockerfile
  #     ports:
  #       - "3005:3005"
  #     networks:
  #       - app-network
  #     depends_on:
  #       - userservice
  #       - taskservice
  #       - notificationservice
  #       - chatservice
  #       - authservice

volumes:
  postgres_data:
    name: postgres_data

networks:
  app-network:
    driver: bridge
