syntax = "proto3";

option csharp_namespace = "ChatService.Protos";

package user;

service UserGrpc {
  rpc GetUserById (UserIdRequest) returns (UserResponse);
}

message UserIdRequest {
  int32 id = 1;
}

message UserResponse {
  int32 id = 1;
  string username = 2;
  string email = 3;
  string createdAt = 4;
}