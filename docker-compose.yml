version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres2
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    networks:
      - app-network

  userservice:
    build:
      context: .
      dockerfile: UserService/Dockerfile
    ports:
      - "5001:8080" # out -> in
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - app-network

  taskservice:
    build:
      context: .
      dockerfile: TaskService/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - userservice
    networks:
      - app-network

volumes:
  postgres_data:
    name: postgres_data

networks:
  app-network:
    driver: bridge
