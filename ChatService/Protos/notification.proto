syntax = "proto3";

option csharp_namespace = "NotificationService.Protos";

package notification;

service NotificationGrpc {
  rpc SendTaskNotification (NotificationTaskRequest) returns (NotificationTaskResponse);
  rpc SendMessageNotification (NotificationMessageRequest) returns (NotificationMessageResponse);
}

message NotificationTaskRequest {
  int32 userId = 1;
  string message = 2;
  int32 taskId = 3;
}

message NotificationMessageRequest {
  int32 userId = 1;
  string message = 2;
  int32 messageId = 3;
}

message NotificationTaskResponse {
  bool success = 1;
}

message NotificationMessageResponse {
  bool success = 1;
}